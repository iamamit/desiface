name: CI

on:
  pull_request:
    branches: [develop, main]

# Cancel in-progress runs for the same PR when new commits are pushed
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Backend unit + integration tests ─────────────────────────────────────
  backend-tests:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_desiface
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/test_desiface
          DEV_MODE: "True"
          SECRET_KEY: "ci-test-secret-key-not-for-production"
          UPLOAD_DIR: /tmp/test_uploads
        run: pytest tests/ -v --tb=short

  # ── 2. Frontend TypeScript type check ───────────────────────────────────────
  frontend-typecheck:
    name: Frontend TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── 3. Playwright E2E tests ──────────────────────────────────────────────────
  e2e-tests:
    name: Playwright E2E
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: desiface
          POSTGRES_PASSWORD: desiface
          POSTGRES_DB: desiface
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Install everything before starting services
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install chromium --with-deps

      # Run DB migrations
      - name: Run Alembic migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://desiface:desiface@localhost:5432/desiface
          SECRET_KEY: ci-e2e-secret-key
          DEV_MODE: "True"
          UPLOAD_DIR: /tmp/uploads
        run: alembic upgrade head

      # Start backend in background, log to file
      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://desiface:desiface@localhost:5432/desiface
          SECRET_KEY: ci-e2e-secret-key
          DEV_MODE: "True"
          UPLOAD_DIR: /tmp/uploads
          CORS_ORIGINS: '["http://localhost:3001"]'
        run: nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &

      # Start Next.js dev server in background, log to file
      - name: Start frontend dev server
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_WS_URL: ws://localhost:8000
        run: nohup npm run dev > /tmp/frontend.log 2>&1 &

      - name: Wait for services to be ready
        run: npx wait-on http-get://localhost:8000/health http-get://localhost:3000 --timeout 120000

      - name: Run Playwright tests
        working-directory: e2e
        env:
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Print backend log on failure
        if: failure()
        run: cat /tmp/backend.log || true

      - name: Print frontend log on failure
        if: failure()
        run: cat /tmp/frontend.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
